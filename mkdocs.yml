site_name: Game Engine Docs (name pending)
repo_url: https://github.com/IsItJeff/game-engine
edit_uri: edit/main/docs/

theme:
  name: material
  font:
    text: Atkinson Hyperlegible Next
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - attr_list
  - md_in_html

plugins:
  - search
  - tags
  - git-revision-date-localized:
      type: timeago
      fallback_to_build_date: true
      strict: false # uncommitted pages fall back to build date without failing --strict
  - timetoread

extra_css:
  - stylesheets/accessibility.css

# docs/design/** is the frozen planning archive: buildable, searchable, out of nav.
nav:
  - Home: index.md
  - Handbook:
      - handbook/index.md
  - Engine Docs:
      - engine/index.md
      - Game Pitch: engine/pitch.md
      - Roadmap: engine/roadmap.md
      - Architecture:
          - engine/architecture/index.md
