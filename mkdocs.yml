          - engine/architecture/adr-0005-predicted-movement-is-cpp.md
          - engine/architecture/adr-0006-first-party-as-a-mod-ratchet.md
          - engine/architecture/adr-0007-cpp20-cmake-vcpkg.md
          - engine/architecture/adr-0008-sdl3-platform.md
          - engine/architecture/adr-0009-sdl-gpu-renderer.md
          - engine/architecture/adr-0010-entt-ecs.md
