name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_COMMIT: dfcb04008a5a9e038a4ae0d1af57909e30d21359
  VCPKG_BINARY_SOURCES: clear;x-gha,readwrite

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Enable vcpkg GitHub Actions binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Set up vcpkg (pinned)
        run: |
          git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          git -C $env:VCPKG_ROOT checkout $env:VCPKG_COMMIT
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics
      - name: Configure
        run: cmake --preset ci-msvc
      - name: Build
        run: cmake --build --preset ci-msvc
      - name: Test
        run: ctest --preset ci-msvc
      - name: Boot smoke (headless)
        run: build\ci-msvc\game\app\game.exe
      - name: Include-graph check
        run: python scripts/check_includes.py

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja
        run: brew install ninja
      - name: Enable vcpkg GitHub Actions binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Set up vcpkg (pinned)
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: cmake --build --preset ci
      - name: Test
        run: ctest --preset ci
      - name: Boot smoke (headless)
        run: build/ci/game/app/game
      - name: Include-graph check
        run: python3 scripts/check_includes.py

  linux:
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - name: Install ninja + SDL3 port system deps (x11/wayland/ibus)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            libx11-dev libxft-dev libxext-dev \
            libwayland-dev libxkbcommon-dev libegl1-mesa-dev \
            libibus-1.0-dev
      - name: Enable vcpkg GitHub Actions binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Set up vcpkg (pinned)
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: cmake --build --preset ci
      - name: Test
        run: ctest --preset ci
      - name: Boot smoke (headless)
        run: build/ci/game/app/game
      - name: Include-graph check
        run: python3 scripts/check_includes.py
      - name: clang-format check
        run: |
          find engine game tests \( -name '*.cpp' -o -name '*.hpp' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror
