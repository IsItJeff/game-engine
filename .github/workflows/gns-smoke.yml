# GameNetworkingSockets is the heaviest future dependency (OpenSSL + protobuf).
# The plan retires its build risk at M0 without paying the cost per-push:
# this proves the pinned vcpkg baseline still builds it, monthly + on demand.
# First real use is M3.
name: gns-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *" # monthly, 1st at 06:00 UTC

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_COMMIT: dfcb04008a5a9e038a4ae0d1af57909e30d21359
  VCPKG_BINARY_SOURCES: clear;x-gha,readwrite

jobs:
  gns:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Enable vcpkg GitHub Actions binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RESULTS_URL', process.env.ACTIONS_RESULTS_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      - name: Set up vcpkg (pinned)
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout "$VCPKG_COMMIT"
          if [ "$RUNNER_OS" = "Windows" ]; then
            "$VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics
          else
            "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          fi
      - name: Build gamenetworkingsockets (classic mode)
        shell: bash
        working-directory: ${{ env.VCPKG_ROOT }}
        run: ./vcpkg install gamenetworkingsockets
